<!DOCTYPE html>
<html>
<head>
    <title>Darttoernooi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px;
            width: 95%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #e84118;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #0984e3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Poirot Open Darts</h1>

    <form method="POST">
        <input type="text" name="naam" placeholder="Naam (verplicht)" required>
        <input type="text" name="bijnaam" placeholder="Bijnaam (optioneel)">
        <input type="text" name="lied" placeholder="Opkomstlied (verplicht)">
        <button type="submit">Inschrijven</button>
    </form>

    <a href="/deelnemers">Bekijk deelnemers</a>
</div>

</body>
</html>
